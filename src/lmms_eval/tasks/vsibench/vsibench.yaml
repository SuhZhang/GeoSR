
dataset_path: json
dataset_kwargs:
  data_files:
    test: data/VSI-Bench_HF/test.jsonl
  cache_dir: data/VSI-Bench_HF/DATA
  local_files_only: true
task: vsibench
test_split: test
output_type: generate_until
process_docs: !function utils.process_docs
doc_to_visual: !function utils.vsibench_doc_to_visual
doc_to_text: !function utils.vsibench_doc_to_text
doc_to_target: "ground_truth"
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
# The return value of process_results will be used by metrics
process_results: !function utils.vsibench_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: vsibench_score
    aggregation: !function utils.vsibench_aggregate_results
    higher_is_better: true
  - metric: vsi_obj_count
    aggregation: !function utils.vsibench_aggregate_obj_count
    higher_is_better: true
  - metric: vsi_abs_dist
    aggregation: !function utils.vsibench_aggregate_abs_dist
    higher_is_better: true
  - metric: vsi_obj_size
    aggregation: !function utils.vsibench_aggregate_obj_size
    higher_is_better: true
  - metric: vsi_room_size
    aggregation: !function utils.vsibench_aggregate_room_size
    higher_is_better: true
  - metric: vsi_rel_dist
    aggregation: !function utils.vsibench_aggregate_rel_dist
    higher_is_better: true
  - metric: vsi_rel_dir
    aggregation: !function utils.vsibench_aggregate_rel_dir
    higher_is_better: true
  - metric: vsi_route_plan
    aggregation: !function utils.vsibench_aggregate_route_plan
    higher_is_better: true
  - metric: vsi_appr_order
    aggregation: !function utils.vsibench_aggregate_appr_order
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    mca_post_prompt: "Answer with the option's letter from the given choices directly."
    na_post_prompt: "Please answer the question using a single word or phrase."
metadata:
  - version: 0.0
